<!DOCTYPE html>
<html>
<head>
  <title>Class 6 Math - Integers & Modulus Challenge</title>
  <style>
    body {
      font-family: Arial;
      background-color: #cfe8f7;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 450px;
      margin: auto;
    }
    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #fff4b3;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🔢 Set 1: Introduction to Integers & Modulus</h2>
<div id="score">Score: 0</div>
<div class="box" id="quiz"></div>
<div id="result"></div>

<script>
let questions = [
  {q: "The collection of negative numbers along with whole numbers is known as?", options: ["Integers", "Natural numbers", "Fractions"], answer: 0},
  {q: "Which of the following is a negative integer?", options: ["-5", "5", "0"], answer: 0},
  {q: "Which of the following is a positive integer?", options: ["12", "-12", "0"], answer: 0},
  {q: "Zero is classified as:", options: ["Neither positive nor negative", "A positive integer", "A negative integer"], answer: 0},
  {q: "Every number to the right of zero on a number line is:", options: ["Greater than zero", "Less than zero", "Equal to zero"], answer: 0},
  {q: "Negative integers are always located on which side of zero?", options: ["Left", "Right", "Top"], answer: 0},
  {q: "If a mirror is placed at 0, what is the image of 2?", options: ["-2", "2", "0"], answer: 0},
  {q: "On the number line, numbers increase when we move towards the:", options: ["Right", "Left", "Center"], answer: 0},
  {q: "On the number line, numbers decrease when we move towards the:", options: ["Left", "Right", "Upward"], answer: 0},
  {q: "Any positive integer is larger than:", options: ["All negative integers", "All positive integers", "No numbers"], answer: 0},
  {q: "Fill in the blank: -8 ___ -5", options: ["<", ">", "="], answer: 0},
  {q: "Fill in the blank: -3 ___ -5", options: [">", "<", "="], answer: 0},
  {q: "Fill in the blank: -6 ___ -4", options: ["<", ">", "="], answer: 0},
  {q: "What is the modulus of -3?", options: ["3", "-3", "0"], answer: 0},
  {q: "What is the absolute value of -11?", options: ["11", "-11", "0"], answer: 0},
  {q: "What is the absolute value of +16?", options: ["16", "-16", "0"], answer: 0},
  {q: "Evaluate: | -6 |", options: ["6", "-6", "0"], answer: 0},
  {q: "Evaluate: | +10 |", options: ["10", "-10", "1"], answer: 0},
  {q: "Evaluate: | -666 |", options: ["666", "-666", "0"], answer: 0},
  {q: "The modulus of an integer indicates its distance from:", options: ["0", "1", "-1"], answer: 0},
  {q: "The modulus of an integer is always:", options: ["Positive", "Negative", "Zero"], answer: 0},
  {q: "The modulus of a positive integer is equal to:", options: ["The integer itself", "Its negative form", "Zero"], answer: 0},
  {q: "Evaluate: 3 + | -1 |", options: ["4", "2", "3"], answer: 0},
  {q: "Evaluate: 10 - | +5 |", options: ["5", "15", "-5"], answer: 0},
  {q: "Evaluate: | -6 | + | -10 |", options: ["16", "4", "-16"], answer: 0}
];

let current = 0;
let score = 0;
let currentShuffledOptions = [];
let correctTextForCurrentQuestion = "";

let clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");
let wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function loadQuestion() {
  if (current >= questions.length) {
    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerHTML = "🎉 Finished! Final Score: " + score + " / " + questions.length;
    return;
  }
  let q = questions[current];
  correctTextForCurrentQuestion = q.options[q.answer];
  currentShuffledOptions = shuffle([...q.options]);
  let html = `<p><b>${q.q}</b></p>`;
  currentShuffledOptions.forEach((opt, index) => {
    html += `<button onclick="check(${index})">${opt}</button>`;
  });
  document.getElementById("quiz").innerHTML = html;
}

function check(selectedIndex) {
  clickSound.play().catch(e => {});
  let selectedText = currentShuffledOptions[selectedIndex];
  let buttons = document.querySelectorAll("#quiz button");
  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    let btnText = currentShuffledOptions[idx];
    if (btnText === correctTextForCurrentQuestion) {
      btn.style.background = "#a8e6a3";
    }
    if (idx === selectedIndex && selectedText !== correctTextForCurrentQuestion) {
      btn.style.background = "#ffb3b3";
    }
  });

  if (selectedText === correctTextForCurrentQuestion) {
    score++;
    correctSound.play().catch(e => {});
  } else {
    wrongSound.play().catch(e => {});
  }
  document.getElementById("score").innerText = "Score: " + score;
  setTimeout(() => {
    current++;
    loadQuestion();
  }, 1200);
}
loadQuestion();
</script>
</body>
</html>
