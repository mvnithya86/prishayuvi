<!DOCTYPE html>
<html>
<head>
  <title>Numbers Challenge - Part 1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #cfe8f7;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #fff4b3;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not([disabled]) {
      background: #ffe97d;
    }

    #score {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    #result {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>🔢 Numbers Quiz - Practice Set 1</h2>
<div id="score">Score: 0</div>

<div class="box" id="quiz"></div>
<div id="result"></div>

<script>
let questions = [
  {q: "What is the face value of the digit 7 in the number 67,805?", options: ["7", "7,000", "70,000", "700"], answer: 0},
  {q: "In the number 67,805, what is the place value of the digit 6?", options: ["60,000", "6,000", "600,000", "6"], answer: 0},
  {q: "Which digit has a place value of 0 in the number 67,805?", options: ["0", "5", "8", "7"], answer: 0},
  {q: "What is the expanded form of 67,805?", options: ["60,000 + 7,000 + 800 + 5", "6,000 + 700 + 80 + 5", "60,000 + 7,000 + 80 + 5", "600,000 + 7,000 + 800 + 5"], answer: 0},
  {q: "What is the correct number name for 67,805 in the Indian system?", options: ["Sixty-seven thousand eight hundred five", "Sixty-seven thousand eighty-five", "Six lakh seven thousand eight hundred five", "Sixty-seven million eight hundred five"], answer: 0},
  {q: "If you add 1 to the largest 5-digit number, what do you get?", options: ["Smallest 6-digit number", "Largest 6-digit number", "Smallest 5-digit number", "1,000,000"], answer: 0},
  {q: "What is the standard numeral for 90,000 + 5,000 + 400 + 20 + 1?", options: ["95,421", "9,542", "954,021", "905,421"], answer: 0},
  {q: "What is the difference between the place value and face value of 8 in 67,805?", options: ["792", "800", "8", "799"], answer: 0},
  {q: "Which of the following is the smallest 6-digit number?", options: ["1,00,000", "9,99,999", "1,00,001", "1,11,111"], answer: 0},
  {q: "What is the value of 10 tens?", options: ["1 hundred", "1 thousand", "10 hundreds", "10"], answer: 0},
  {q: "How many thousands make 1 lakh?", options: ["100 thousands", "10 thousands", "1,000 thousands", "1000"], answer: 0},
  {q: "In the Indian place value system, which period comes immediately after the Thousands period?", options: ["Lakhs", "Crores", "Millions", "Hundreds"], answer: 0},
  {q: "What is the sum of the place values of two 5s in the number 50,452?", options: ["50,050", "5,050", "500,050", "550"], answer: 0},
  {q: "What is the value of 100 hundreds?", options: ["10,000", "1,000", "100,000", "100"], answer: 0},
  {q: "If a digit is shifted one place to the left in a place value chart, its value increases by how many times?", options: ["10 times", "100 times", "1 time", "1,000 times"], answer: 0},
  {q: "What is the predecessor of the smallest 6-digit number?", options: ["99,999", "1,00,001", "99,990", "10,000"], answer: 0},
  {q: "What is the successor of the largest 6-digit number?", options: ["1,00,00,000", "1,00,000", "10,00,000", "9,99,999"], answer: 2},
  {q: "How many zero digits are there in ten lakh?", options: ["6", "5", "7", "4"], answer: 0},
  {q: "Which number is written as Ninety-nine thousand nine hundred nine?", options: ["99,909", "99,990", "99,009", "9,999"], answer: 0},
  {q: "In the number 8,76,543, which digit belongs to the Lakhs period?", options: ["8", "7", "6", "5"], answer: 0},
  {q: "What is the product of the face value and place value of 3 in 45,312?", options: ["90,000", "300", "900", "600"], answer: 0},
  {q: "How many elements/places are there within each period in the Indian system starting from Thousands?", options: ["2", "3", "1", "4"], answer: 0},
  {q: "Thinking Question: If you swap the digits at the thousands and tens places in 34,567, what is the new number?", options: ["36,547", "34,657", "35,467", "74,563"], answer: 0},
  {q: "Thinking Question: How many 4-digit numbers can you form using the digits 5 and 0 if repetition is not allowed?", options: ["0", "1", "2", "4"], answer: 1},
  {q: "What is the sum of the face values of all digits in the number 1,234?", options: ["10", "1,234", "1,000", "24"], answer: 0}
];

let current = 0;
let score = 0;
let currentShuffledOptions = [];
let correctTextForCurrentQuestion = "";

let clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");
let wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function loadQuestion() {
  if (current >= questions.length) {
    document.getElementById("quiz").innerHTML = "";
    document.getElementById("result").innerHTML =
      "🎉 Finished Set 1! Final Score: " + score + " / " + questions.length;
    return;
  }

  let q = questions[current];
  correctTextForCurrentQuestion = q.options[q.answer];
  currentShuffledOptions = shuffle([...q.options]);

  let html = `<p><b>Question ${current + 1}: ${q.q}</b></p>`;

  currentShuffledOptions.forEach((opt, index) => {
    html += `<button onclick="check(${index})">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function check(selectedIndex) {
  clickSound.play().catch(e => {});

  let selectedText = currentShuffledOptions[selectedIndex];
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((btn, idx) => {
    btn.disabled = true;

    if (currentShuffledOptions[idx] === correctTextForCurrentQuestion) {
      btn.style.background = "#a8e6a3";
    }

    if (
      idx === selectedIndex &&
      selectedText !== correctTextForCurrentQuestion
    ) {
      btn.style.background = "#ffb3b3";
    }
  });

  if (selectedText === correctTextForCurrentQuestion) {
    score++;
    correctSound.play().catch(e => {});
  } else {
    wrongSound.play().catch(e => {});
  }

  document.getElementById("score").innerText = "Score: " + score;

  setTimeout(() => {
    current++;
    loadQuestion();
  }, 1300);
}

loadQuestion();
</script>

</body>
</html>
